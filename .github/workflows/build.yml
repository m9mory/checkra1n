name: Build checkra1n

on:
  workflow_dispatch:
    inputs:
      signing:
        description: 'Signing method'
        type: choice
        default: 'ldid'
        options:
          - ldid
          - unsigned
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build checkra1n IPA
    runs-on: macos-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Toolchain
      # ------------------------------------------------------------------
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install ldid (for pseudo-signing)
        if: ${{ github.event.inputs.signing == 'ldid' || github.event.inputs.signing == '' }}
        run: brew install ldid

      # ------------------------------------------------------------------
      # 3. Generate icons & Xcode project
      # ------------------------------------------------------------------
      - name: Generate app icons
        run: bash scripts/generate_icons.sh "$(pwd)"

      - name: Generate Xcode project (XcodeGen)
        run: xcodegen generate --spec project.yml

      # ------------------------------------------------------------------
      # 4. Build unsigned .app with xcodebuild
      # ------------------------------------------------------------------
      - name: Build for iOS device
        run: |
          xcodebuild build \
            -project checkra1n.xcodeproj \
            -scheme checkra1n \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO

      # ------------------------------------------------------------------
      # 5. Package .app → .ipa
      # ------------------------------------------------------------------
      - name: Locate .app and prepare Payload
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products -name "checkra1n.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Could not find checkra1n.app in DerivedData"
            find ./DerivedData -name "*.app" -type d || true
            exit 1
          fi
          echo "✔ Found: $APP_PATH"

          # Pseudo-sign binary with ldid (if available)
          if command -v ldid >/dev/null 2>&1 && [ "${{ github.event.inputs.signing }}" != "unsigned" ]; then
            echo "→ Pseudo-signing with ldid…"
            ldid -S"$(pwd)/checkra1n.entitlements" "$APP_PATH/checkra1n" || true
            echo "✔ ldid pseudo-signing complete"
          else
            echo "→ Skipping pseudo-sign (unsigned IPA)"
          fi

          # Package into IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r9 "checkra1n.ipa" Payload
          rm -rf Payload
          echo "✔ IPA created: checkra1n.ipa ($(du -sh checkra1n.ipa | cut -f1))"

      # ------------------------------------------------------------------
      # 6. Upload artifact (backup)
      # ------------------------------------------------------------------
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkra1n
          path: checkra1n.ipa
          retention-days: 7
          compression-level: 0

      # ------------------------------------------------------------------
      # 7. Publish to GitHub Releases
      # ------------------------------------------------------------------
      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete old nightly
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true

          # New tag at current commit
          git tag -f nightly
          git push origin nightly --force

          # Write release notes (heredoc: unquoted → shell expands $(date), backticks escaped)
          cat > /tmp/notes.md << ENDNOTES
        ## 🔓 checkra1n 0.13.3 beta — Nightly Build

        Автоматическая сборка из ветки \`${{ github.ref_name }}\`.

        | | |
        |---|---|
        | **Коммит** | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
        | **Дата** | $(date -u +"%Y-%m-%d %H:%M UTC") |

        ### Установка
        Используй **AltStore**, **Sideloadly** или **SideStore** чтобы подписать IPA своим Apple ID.

        > ⚠️ Это пре-релиз для тестирования. Может содержать баги.
        ENDNOTES

          gh release create nightly checkra1n.ipa \
            --title "Nightly Build" \
            --notes-file /tmp/notes.md \
            --prerelease \
            --latest=false

      - name: Summary
        run: |
          echo "### 🔓 checkra1n build complete" >> $GITHUB_STEP_SUMMARY
          echo "📦 Скачай IPA в [Releases](https://github.com/${{ github.repository }}/releases/latest)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 Для установки: **AltStore**, **Sideloadly** или **SideStore**" >> $GITHUB_STEP_SUMMARY
