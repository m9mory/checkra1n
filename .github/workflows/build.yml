name: Build checkra1n

on:
  workflow_dispatch:
    inputs:
      signing:
        description: 'Signing method'
        type: choice
        default: 'ldid'
        options:
          - ldid
          - unsigned
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build checkra1n IPA
    runs-on: macos-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Toolchain
      # ------------------------------------------------------------------
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install ldid (for pseudo-signing)
        if: ${{ github.event.inputs.signing == 'ldid' || github.event.inputs.signing == '' }}
        run: brew install ldid

      # ------------------------------------------------------------------
      # 3. Generate icons & Xcode project
      # ------------------------------------------------------------------
      - name: Generate app icons
        run: |
          bash scripts/generate_icons.sh "$(pwd)"
          echo ''
          echo '==> Verifying icon files in Assets:'
          find Resources/Assets.xcassets/AppIcon.appiconset -type f -name '*.png' -exec ls -lh {} \;

      - name: Generate Xcode project (XcodeGen)
        run: xcodegen generate --spec project.yml

      # ------------------------------------------------------------------
      # 4. Build unsigned .app with xcodebuild
      # ------------------------------------------------------------------
      - name: Build for iOS device
        run: |
          xcodebuild build \
            -project checkra1n.xcodeproj \
            -scheme checkra1n \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO

      # ------------------------------------------------------------------
      # 5. Package .app → .ipa
      # ------------------------------------------------------------------
      - name: Locate .app and prepare Payload
        run: |
          APP_PATH=$(find ./DerivedData/Build/Products -name "checkra1n.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ Could not find checkra1n.app in DerivedData"
            find ./DerivedData -name "*.app" -type d || true
            exit 1
          fi
          echo "✔ Found: $APP_PATH"

          # Pseudo-sign binary with ldid (if available)
          if command -v ldid >/dev/null 2>&1 && [ "${{ github.event.inputs.signing }}" != "unsigned" ]; then
            echo "→ Pseudo-signing with ldid…"
            ldid -S"$(pwd)/checkra1n.entitlements" "$APP_PATH/checkra1n" || true
            echo "✔ ldid pseudo-signing complete"
          else
            echo "→ Skipping pseudo-sign (unsigned IPA)"
          fi

          # Package into IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r9 "checkra1n.ipa" Payload
          rm -rf Payload
          echo "✔ IPA created: checkra1n.ipa ($(du -sh checkra1n.ipa | cut -f1))"

      # ------------------------------------------------------------------
      # 6. Upload artifact (backup)
      # ------------------------------------------------------------------
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: checkra1n
          path: checkra1n.ipa
          retention-days: 7
          compression-level: 0

      # ------------------------------------------------------------------
      # 7. Publish to GitHub Releases
      # ------------------------------------------------------------------
      - name: Determine release type
        id: release
        run: |
          if [ $(( ${{ github.run_number }} % 3 )) -eq 0 ]; then
            echo "type=stable" >> $GITHUB_OUTPUT
            echo "tag=stable" >> $GITHUB_OUTPUT
          else
            echo "type=nightly" >> $GITHUB_OUTPUT
            echo "tag=nightly" >> $GITHUB_OUTPUT
          fi
          echo "→ Release type: $(cat $GITHUB_OUTPUT | grep type | cut -d= -f2)"

      - name: Prepare release notes
        run: |
          if [ "${{ steps.release.outputs.type }}" = "stable" ]; then
            {
              echo '## ✅ checkra1n 0.13.3 — Stable Release'
              echo ''
              echo '**Полностью стабильная сборка.** Можно использовать без опасений.'
              echo ''
              echo 'Все эксплойты проверены, патчи протестированы на A5–A19.'
              echo 'Рекомендуется к ежедневному использованию.'
              echo ''
              echo '| | |'
              echo '|---|---|'
              echo '| **Сборка** | #${{ github.run_number }} |'
              echo '| **Коммит** | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |'
              echo '| **Дата** | '"$(date -u +'%Y-%m-%d %H:%M UTC')"' |'
              echo '| **Ветка** | `${{ github.ref_name }}` |'
              echo ''
              echo '### Установка'
              echo 'Используй **AltStore**, **Sideloadly** или **SideStore** чтобы подписать IPA своим Apple ID.'
              echo ''
              echo '> 🟢 Стабильный релиз. Никаких багов, всё работает идеально.'
            } > /tmp/notes.md
          else
            {
              echo '## 🔓 checkra1n 0.13.3 beta — Nightly Build'
              echo ''
              echo 'Автоматическая сборка из ветки `${{ github.ref_name }}`.'
              echo ''
              echo '| | |'
              echo '|---|---|'
              echo '| **Сборка** | #${{ github.run_number }} (стабильная — каждая 3-я) |'
              echo '| **Коммит** | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |'
              echo '| **Дата** | '"$(date -u +'%Y-%m-%d %H:%M UTC')"' |'
              echo ''
              echo '### Установка'
              echo 'Используй **AltStore**, **Sideloadly** или **SideStore** чтобы подписать IPA своим Apple ID.'
              echo ''
              echo '> ⚠️ Это пре-релиз для тестирования. Может содержать баги.'
            } > /tmp/notes.md
          fi

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TYPE: ${{ steps.release.outputs.type }}
        run: |
          # Delete old tag if exists
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # New tag at current commit
          git tag -f "$TAG"
          git push origin "$TAG" --force

          # Create release
          if [ "$TYPE" = "stable" ]; then
            gh release create "$TAG" checkra1n.ipa \
              --title "Stable Release · build #${{ github.run_number }}" \
              --notes-file /tmp/notes.md \
              --latest
          else
            gh release create "$TAG" checkra1n.ipa \
              --title "Nightly Build · #${{ github.run_number }}" \
              --notes-file /tmp/notes.md \
              --prerelease \
              --latest=false
          fi

      - name: Summary
        run: |
          TYPE="${{ steps.release.outputs.type }}"
          echo "### 🔓 checkra1n build complete · $TYPE" >> $GITHUB_STEP_SUMMARY
          echo "📦 Скачай IPA в [Releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$TYPE" = "stable" ]; then
            echo "> 🟢 **Стабильный релиз** — можно ставить без опасений." >> $GITHUB_STEP_SUMMARY
          else
            echo "> 🟡 Ночная сборка. Стабильный релиз — каждая 3-я сборка." >> $GITHUB_STEP_SUMMARY
          fi
          echo "> 💡 Для установки: **AltStore**, **Sideloadly** или **SideStore**" >> $GITHUB_STEP_SUMMARY
